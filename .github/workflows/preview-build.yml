name: Preview Build

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  preview:
    name: Build Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Determine platform
        id: platform
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "platform=${{ github.event.inputs.platform }}" >> $GITHUB_OUTPUT
          else
            echo "platform=android" >> $GITHUB_OUTPUT
          fi

      - name: Build Preview (Android)
        if: steps.platform.outputs.platform == 'android' || steps.platform.outputs.platform == 'all'
        run: eas build --platform android --profile preview --non-interactive

      - name: Build Preview (iOS)
        if: steps.platform.outputs.platform == 'ios' || steps.platform.outputs.platform == 'all'
        run: eas build --platform ios --profile preview --non-interactive

      - name: Comment on PR with build status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            const body = `## 📱 Preview Build Started

            A preview build has been triggered for this PR.

            **Platform:** ${{ steps.platform.outputs.platform }}
            **Build Profile:** preview

            Check the [EAS Build Dashboard](https://expo.dev/accounts/${{ github.repository_owner }}/projects/dlcf-study-analyst/builds) for build status and download links.

            ---
            *Triggered by commit ${{ github.sha }}*`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body
            });
